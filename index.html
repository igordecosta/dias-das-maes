<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- ✅ AJUSTE PARA EVITAR ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Dia das Mães 💛</title>

<style>
html {
  -webkit-text-size-adjust: 100%;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #fff5f0, #ffe3d4);
  text-align: center;
  overflow-x: hidden;
}

/* HEADER */
.header-global {
  background: white;
  padding: 15px 10px 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.header-title {
  font-size: 20px;
  font-weight: 700;
}

.preto { color: #000; }
.laranja { color: #FF6200; }

.header-sub {
  font-size: 12px;
  color: #888;
}

/* TELAS */
.screen {
  display: none;
  padding: 10px 20px 30px;
}

.active {
  display: block;
}

/* VOLTAR */
.voltar-container {
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}

.voltar {
  background: transparent;
  color: #FF6200;
  border: 1px solid #FF6200;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  width: fit-content;
}

/* CARD */
.card {
  background: white;
  padding: 30px 20px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
  margin-top: 20px;
}

.titulo span {
  color: #FF6200;
  font-weight: bold;
}

.sub {
  color: #666;
  margin: 20px 0;
}

button {
  background: #FF6200;
  color: white;
  border: none;
  padding: 16px;
  margin: 10px;
  border-radius: 12px;
  width: 85%;
  max-width: 320px;
  font-size: 16px;
  cursor: pointer;
}

/* ✅ INPUT SEM ZOOM */
input {
  width: 85%;
  max-width: 320px;
  padding: 14px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;

  font-size: 16px;
}

/* CONTADOR */
.counter {
  margin-top: 20px;
  font-size: 14px;
  color: #555;
}

/* CORAÇÕES */
.heart {
  position: fixed;
  bottom: -20px;
  font-size: 16px;
  animation: subir 4s linear forwards;
  opacity: 0.85;
  pointer-events: none;
}

@keyframes subir {
  0% {transform: translateY(0) scale(1); opacity: 0.85;}
  100% {transform: translateY(-100vh) scale(1.5); opacity: 0;}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header-global">
  <div class="header-title">
    <span class="preto">Radar do Clima</span>
    <span class="laranja"> SRH</span>
  </div>
  <div class="header-sub">
    Superintendência Folhas de Pagamento e Soluções de RH
  </div>
</div>

<!-- TELA 1 -->
<div id="tela1" class="screen active">
  <div class="card">
    <h2 class="titulo">
      Quando foi a última vez que você disse <br>
      <span>“eu te amo”</span>?
    </h2>

    <p class="sub">
      Às vezes a gente sente… mas não fala.<br>
      Hoje você pode mudar isso 🧡
    </p>

    <button onclick="proximaTela('tela2')">Falar agora</button>

    <div class="counter">
      💌 <span id="contador">0</span> mensagens enviadas hoje
    </div>
  </div>
</div>

<!-- TELA 2 -->
<div id="tela2" class="screen">
  <div class="voltar-container">
    <button class="voltar" onclick="proximaTela('tela1')">Voltar</button>
  </div>

  <div class="card">
    <h2>Quem é você?</h2>
    <button onclick="proximaTela('tela3')">Sou filho ou filha</button>
    <button onclick="proximaTela('tela4')">Sou mãe</button>
  </div>
</div>

<!-- FILHO -->
<div id="tela3" class="screen">
  <div class="voltar-container">
    <button class="voltar" onclick="proximaTela('tela2')">Voltar</button>
  </div>

  <div class="card">
    <h2>Preencha os dados</h2>

    <input id="nomePessoa" placeholder="Seu nome">
    <input id="nomeMae" placeholder="Nome da mãe">
    <input id="telefoneMae" placeholder="Whatsapp - Ex: 11987654321">

    <button onclick="enviarFilho()">Enviar 💌</button>
  </div>
</div>

<!-- MÃE -->
<div id="tela4" class="screen">
  <div class="voltar-container">
    <button class="voltar" onclick="proximaTela('tela2')">Voltar</button>
  </div>

  <div class="card">
    <h2>Preencha os dados</h2>

    <input id="nomeMaeMsg" placeholder="Seu nome">
    <input id="nomeFilho" placeholder="Nome do filho(a)">
    <input id="telefoneFilho" placeholder="Whatsapp - Ex: 11987654321">

    <button onclick="enviarMae()">Enviar 💛</button>
  </div>
</div>

<script>
let contador = localStorage.getItem("contador") || 0;
document.getElementById("contador").innerText = contador;

function proximaTela(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function atualizarContador() {
  contador++;
  localStorage.setItem("contador", contador);
  document.getElementById("contador").innerText = contador;
}

function criarCoracao() {
  let heart = document.createElement("div");
  heart.className = "heart";

  let cores = ["❤️", "🧡", "💙"];
  heart.innerHTML = cores[Math.floor(Math.random() * cores.length)];

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 10 + 12) + "px";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 4000);
}

setInterval(criarCoracao, 600);

function coracoesExplosao() {
  for (let i = 0; i < 10; i++) criarCoracao();
}

function enviarFilho() {
  let nome = document.getElementById("nomePessoa").value;
  let mae = document.getElementById("nomeMae").value;
  let tel = document.getElementById("telefoneMae").value.replace(/\D/g,'');

  if (!nome || !mae || !tel) return alert("Preencha tudo");

  atualizarContador();
  coracoesExplosao();

  let msg = `💐 *Mãe ${mae},* 💐

Queria que você soubesse o quanto eu sou *GRATO* por tudo que você é e por tudo que faz por mim 🧡

✨ _Gratidão_ por cada gesto, cada palavra, cada sacrifício…
mesmo aqueles que aconteceram em silêncio, mas que *NUNCA* deixaram de me alcançar 🙏

Seu jeito de cuidar, de se preocupar, de amar…
é tudo tão único, tão seu 🥹
Você é a minha _paz em forma de gente_ 🤍

🌿 Obrigado por ser meu *REFÚGIO*,
mesmo quando o mundo parece barulhento demais…

Eu te amo com *TODO o meu coração* ❤️
_hoje, amanhã e SEMPRE!_

E toda vez que eu puder retribuir só um pedacinho do que você me deu,
eu já vou me sentir *MUITO feliz* 🥰

💌 _Eu te amo,_
*${nome}*`;

  window.open(`https://wa.me/55${tel}?text=${encodeURIComponent(msg)}`);
}

function enviarMae() {
  let mae = document.getElementById("nomeMaeMsg").value;
  let filho = document.getElementById("nomeFilho").value;
  let tel = document.getElementById("telefoneFilho").value.replace(/\D/g,'');

  if (!mae || !filho || !tel) return alert("Preencha tudo");

  atualizarContador();
  coracoesExplosao();

  let msg = `${filho}, ser sua mãe é uma das coisas mais importantes da minha vida.
Em cada fase sua, eu aprendo, me reinvento e sigo tentando dar o meu melhor por você.
Nem sempre eu acerto, mas tudo que faço é por amor.
Obrigada por ser quem você é.
Eu te amo mais do que consigo explicar 💛 ${mae}`;

  window.open(`https://wa.me/55${tel}?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
